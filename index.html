<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Context Agent</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --border: #2a2f3a;
      --text: #e6e8 ed;
      --muted: #9aa3b2;
      --accent: #6ea8fe;
      --accent-dim: #2b3650;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: #e6e8ed;
      display: flex;
      justify-content: center;
      padding: 48px 20px;
      min-height: 100vh;
    }
    .wrap { width: 100%; max-width: 720px; }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 14px; margin: 0 0 28px; }
    .row { display: flex; gap: 10px; }
    input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: #e6e8ed;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      background: var(--accent);
      color: #0f1115;
      border: none;
      border-radius: 10px;
      padding: 0 22px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .answer {
      margin-top: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
      min-height: 40px;
    }
    .answer:empty::before {
      content: "Answers will appear here.";
      color: var(--muted);
    }
    .muted { color: var(--muted); }
    /* highlight [filename.ext] citations */
    .cite {
      color: var(--accent);
      background: var(--accent-dim);
      border-radius: 5px;
      padding: 1px 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Company Context Agent</h1>
    <p class="sub">Ask a question about the company documents. Every answer is grounded in its source files.</p>

    <div class="row">
      <input id="q" type="text" placeholder="Who is S. Chen and what company are they with?" />
      <button id="go">Ask</button>
    </div>

    <div id="answer" class="answer"></div>
  </div>

  <script>
    const input = document.getElementById("q");
    const button = document.getElementById("go");
    const answerEl = document.getElementById("answer");

    async function ask() {
      const question = input.value.trim();
      if (!question) return;

      button.disabled = true;
      answerEl.innerHTML = '<span class="muted">Thinking…</span>';

      try {
        const res = await fetch("http://localhost:8000/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        // highlight [filename] citations, then show the answer
        const formatted = data.answer
          .replace(/\[([^\]]+)\]/g, '<span class="cite">$1</span>');
        answerEl.innerHTML = formatted;
      } catch (err) {
        answerEl.innerHTML = '<span class="muted">Error reaching the backend. Is the server running?</span>';
      } finally {
        button.disabled = false;
      }
    }

    button.addEventListener("click", ask);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") ask(); });
  </script>
</body>
</html>
